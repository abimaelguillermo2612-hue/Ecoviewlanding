<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoView — Visor de Capturas en Vivo</title>
    <meta name="description" content="EcoView — Monitor de capturas en tiempo real">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #00060e;
            color: #e8f4ff;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        #image-wrapper {
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }
        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            transition: opacity 0.8s ease-in-out;
            opacity: 0;
        }
        img.loaded {
            opacity: 1;
        }
        .status {
            position: fixed;
            bottom: 14px;
            left: 14px;
            font-size: 11px;
            color: rgba(194,240,255,.45);
            display: flex;
            align-items: center;
            gap: 6px;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }
        .dot {
            width: 6px;
            height: 6px;
            background: #00ff9d;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff9d;
            animation: pulse 1.5s infinite;
            flex-shrink: 0;
        }
        .dot.err { background: #ff4d2e; box-shadow: 0 0 8px #ff4d2e; }
        @keyframes pulse {
            0% { opacity: 0.2; }
            50% { opacity: 1; }
            100% { opacity: 0.2; }
        }
        .brand-link {
            position: fixed;
            top: 14px;
            left: 14px;
            font-size: 13px;
            color: rgba(0,212,255,.55);
            text-decoration: none;
            font-family: 'Share Tech Mono', monospace;
            letter-spacing: 3px;
            text-transform: uppercase;
            transition: color .3s;
        }
        .brand-link:hover { color: #00d4ff; }
    </style>
</head>
<body>

    <a href="ecoview_2.html" class="brand-link">← EcoView</a>

    <div id="image-wrapper"></div>

    <div class="status">
        <div class="dot" id="statusDot"></div>
        <span id="log">Conectando...</span>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

        // --- CONFIGURACIÓN ---
        const SUPABASE_URL = 'https://myrmzbgcciyigeazrmfx.supabase.co'
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im15cm16YmdjY2l5aWdlYXpybWZ4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NDAzNzUsImV4cCI6MjA5MDIxNjM3NX0.hKD6QzUOfBG25q-juiW5KPLQFNKMuvZASK_2gf4JjYg'
        const BUCKET_NAME = 'capturas' 
        const FRECUENCIA_BUSQUEDA = 3000; // 3 segundos

        const supabase = createClient(SUPABASE_URL, SUPABASE_KEY)
        let lastFileName = null;

        async function buscarUltimaImagen() {
            try {
                // 1. Listar el último archivo del bucket
                const { data, error } = await supabase
                    .storage
                    .from(BUCKET_NAME)
                    .list('', {
                        limit: 1,
                        sortBy: { column: 'created_at', order: 'desc' }
                    });

                if (error) throw error;

                if (data && data.length > 0) {
                    const currentFile = data[0];

                    // 2. Si el nombre es diferente al anterior, actualizar
                    if (currentFile.name !== lastFileName) {
                        lastFileName = currentFile.name;
                        actualizarDOM(currentFile.name);
                    }
                    document.getElementById('log').innerText = `En línea - Última: ${currentFile.name}`;
                }
            } catch (err) {
                console.error("EcoView Visor:", err);
                document.getElementById('log').innerText = "Error de conexión — reintentando...";
                const dot = document.getElementById('statusDot');
                if(dot) dot.classList.add('err');
                setTimeout(() => { if(dot) dot.classList.remove('err'); }, 3000);
            }
        }

        function actualizarDOM(fileName) {
            const { data } = supabase.storage.from(BUCKET_NAME).getPublicUrl(fileName);
            const wrapper = document.getElementById('image-wrapper');
            
            // Crear nueva imagen para hacer transición suave
            const newImg = new Image();
            newImg.src = data.publicUrl;
            newImg.onload = () => {
                wrapper.innerHTML = ""; // Limpiar anterior
                newImg.classList.add('loaded');
                wrapper.appendChild(newImg);
            };
        }

        // Iniciar ciclo
        buscarUltimaImagen();
        setInterval(buscarUltimaImagen, FRECUENCIA_BUSQUEDA);
    </script>
</body>
</html>
